services:
  - type: web
    name: landing-intel-console
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: TAVILY_SEARCH_DEPTH
        value: basic
      - key: TAVILY_MAX_RESULTS
        value: 6
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
